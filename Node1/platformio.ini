; ============================================================
;  Smart Greenhouse — Node 1 : Climate & Air Management
;  PlatformIO project configuration
; ============================================================
;
;  Quick start:
;    1. Open the Node1/ folder in VS Code (with PlatformIO extension)
;       OR install PlatformIO Core CLI: https://docs.platformio.org/en/latest/core/
;    2. Edit src/main.cpp — set WIFI_SSID and WIFI_PASS
;    3. Connect the ESP32 via USB
;    4. Run:  pio run --target upload
;    5. Run:  pio device monitor   (to see the assigned IP address)
;
; ============================================================

[env:greenhouse_node1]
platform      = espressif32
board         = esp32dev          ; works for most 38-pin ESP32 dev boards
framework     = arduino

; Serial monitor baud rate — must match Serial.begin() in firmware
monitor_speed = 115200

; Faster upload speed — reduce to 460800 if you see upload errors
upload_speed  = 921600

; ── Library dependencies ────────────────────────────────────
; PlatformIO downloads and builds these automatically.
; Versions are pinned with ^ (compatible minor updates allowed).
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    claws/BH1750@^1.3.0
    adafruit/Adafruit BMP085 Library@^1.2.4

; ── Build flags (optional tuning) ───────────────────────────
; Uncomment to enable verbose HTTP server debug output:
; build_flags = -DCORE_DEBUG_LEVEL=3
