; ============================================================
;  Smart Greenhouse — Node 2 : Water & Irrigation Management
;  PlatformIO project configuration
; ============================================================
;
;  Quick start:
;    1. Open the Node2/ folder in VS Code (with PlatformIO extension)
;    2. Edit src/main.cpp — set WIFI_SSID and WIFI_PASS
;    3. Connect the ESP32 via USB
;    4. Run:  pio run --target upload
;    5. Run:  pio device monitor   (to see IP + ADC calibration readings)
;
; ============================================================

[env:greenhouse_node2]
platform      = espressif32
board         = esp32dev
framework     = arduino

monitor_speed = 115200
upload_speed  = 921600

; ── Library dependencies ────────────────────────────────────
; Node 2 only uses ArduinoJson — no external sensor libraries needed.
; All hardware is direct ADC reads on the ESP32 itself.
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
